project:
  type: book
  output-dir: docs
  post-render:
    - scripts/write-pages-marker.R

book:
  title: Administración de riesgos financieros ARF.
  subtitle: Course syllabus. Fall 2026. Under review.
  author: Dr. Martín Lozano
  page-navigation: true
  search: true
  sidebar:
    style: docked
    collapse-level: 1
  page-footer:
    left: "Administraci&oacute;n de riesgos financieros ARF."
    right: 'Dr. Mart&iacute;n Lozano &middot; <a href="mailto:martin.lozano@udem.edu">martin.lozano@udem.edu</a> &middot; <a href="https://mlozanoqf.github.io/">mlozanoqf.github.io</a>'
  chapters:
    - index.qmd
    - part: "Course Foundations"
      chapters:
        - welcome.rmd
        - course-overview.rmd
        - tools-data-science.rmd
    - part: "Activities, Evaluation, and Policies"
      chapters:
        - course-activities.rmd
        - evaluation.rmd
        - rubrics.rmd
        - course-policies.rmd
        - checklist.rmd
    - part: "Schedule and References"
      chapters:
        - schedule.rmd
        - learning-resources.rmd
        - internet-resources.rmd
        - references.qmd

bibliography: 9mybibfile.bib
  
format: 
  html:
    theme:
      light: flatly
      dark: darkly
    toc: false
    toc-title: On this page
    smooth-scroll: true
    code-fold: false
    code-copy: true
    code-tools: false
    code-block-bg: true
    code-block-border-left: "#6A0DAD"
    code-line-numbers: true
    number-sections: false
    toc-location: right
    toc-depth: 2
    page-layout: full
    include-after-body:
      - analytics_arf1.html
      - 11_back-to-top.html
      - 12_progressbar.html
      - 14_local-navigation.html
      - 15_page-sections.html
      - 16_sidebar-accordion.html
    css: syllabus-styles.css
    link-citations: true
